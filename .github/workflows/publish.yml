name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  update-citation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.BOT_TOKEN }}

      - name: Update CITATION.cff
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DATE=$(date +%Y-%m-%d)
          yq -i ".version = \"$VERSION\"" CITATION.cff
          yq -i ".[\"date-released\"] = \"$DATE\"" CITATION.cff
          yq -i ".title = \"John-Ragland/pygenray: $VERSION\"" CITATION.cff

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "chore: update CITATION.cff for ${GITHUB_REF_NAME}"
          git push origin main

  build:
    needs: update-citation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so hatch-vcs reads the tag

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
